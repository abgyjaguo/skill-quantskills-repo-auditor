interface:
  display_name: "QuantSkills Repo Auditor"
  short_description: "Audit QuantSkills repos, update-test decisions, governance issues, stale repos, and homepage / registry / quantskills sync."
  default_prompt: "Use $quantskills-repo-auditor to scan the quantskills GitHub organization, identify newly uploaded or changed repositories that need testing, classify low-risk updates that can skip tests after review, report repository and content rule violations, and check homepage / registry / quantskills index sync. After each patrol, list candidate actions, every repository that would be set private with reasons, and wait for maintainer confirmation before running tests, applying remediation Issues, changing visibility, updating indexes, writing state, committing, or pushing. When remediation Issues are fixed, apply modes may comment on and close the matched Issues. During index sync, canonical registry categories and high-confidence business-signal matches update quantskills curation before navigation generation; low-confidence or conflicting signals remain unwritten. When remote index sync is approved, keep .github, registry, and quantskills synchronized by committing, pushing, and verifying all changed targets."
policy:
  allow_implicit_invocation: true
metadata:
  organization: "abgyjaguo"
  organization_url: "https://github.com/abgyjaguo"
  repository: "skill-quantskills-repo-auditor"
  repository_url: "https://github.com/abgyjaguo/skill-quantskills-repo-auditor"
  target_organization: "QuantSkills"
  target_organization_url: "https://github.com/quantskills"
