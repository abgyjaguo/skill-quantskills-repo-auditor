interface:
  display_name: "QuantSkills Repo Auditor"
  short_description: "Audit QuantSkills repos, update-test decisions, governance issues, stale repos, and homepage / registry / quantskills sync."
  default_prompt: "Use $quantskills-repo-auditor to scan the quantskills GitHub organization, identify newly uploaded or changed repositories that need testing, run detected local tests when explicitly requested, classify low-risk updates that can skip tests after review, report repository and content rule violations, plan or apply explicit community-rule remediation Issues, restore eligible fixed repositories to public when requested, and check or apply GitHub organization homepage / registry / quantskills index sync."
policy:
  allow_implicit_invocation: true
metadata:
  organization: "abgyjaguo"
  organization_url: "https://github.com/abgyjaguo"
  repository: "skill-quantskills-repo-auditor"
  repository_url: "https://github.com/abgyjaguo/skill-quantskills-repo-auditor"
  target_organization: "QuantSkills"
  target_organization_url: "https://github.com/quantskills"
